# 数据源配置
dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
#    jdbcUrl: jdbc:mysql://localhost:3309/Link?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    jdbcUrl: jdbc:mysql://172.23.155.107:3309/Link?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    maximumPoolSize: 10
    minimumIdle: 5
    connectionTimeout: 30000

# 规则配置（重点：与dataSources同级）
rules:
  # 1. 分片规则（独立区块，必须用 !SHARDING）
  - !SHARDING
    tables:
      t_link:
        actualDataNodes: ds_0.t_link_${0..4}
        tableStrategy:
          standard:
            shardingColumn: gid
            shardingAlgorithmName: link_table_hash_mod
      t_link_goto:
        actualDataNodes: ds_0.t_link_goto_${0..4}
        tableStrategy:
          standard:
            shardingColumn: full_short_url
            shardingAlgorithmName: link_goto_table_hash_mod
      t_group:
        actualDataNodes: ds_0.t_group_${0..4}
        tableStrategy:
          standard:
            shardingColumn: username
            shardingAlgorithmName: link_table_hash_mod
    shardingAlgorithms:
      link_table_hash_mod:
        type: HASH_MOD
        props:
          sharding-count: 5
      link_goto_table_hash_mod:
        type: HASH_MOD
        props:
          sharding-count: 5

  # 2. 加密规则（独立区块，必须用 !ENCRYPT）
  - !ENCRYPT
    encryptors:
      aes_encryptor:
        type: AES
        props:
          aes-key-value: dfar3qiejfqhfif9
