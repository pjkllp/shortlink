server:
  port: 8001
  tomcat:
    threads:
      max: 8  # 最大线程数，默认200，改成800
      min-spare: 2  # 最小空闲线程数
spring:
  application:
    name: shortlink-project
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
    hikari:
      pool-name: HikariPool-ShortLink
      # 2核4G服务器核心配置
      maximum-pool-size: 6      # 最大连接数：CPU核心数*2+2
      minimum-idle: 4            # 最小空闲连接：物理核心数*2=4
      idle-timeout: 30000        # 空闲连接超时时间：30秒
      connection-timeout: 30000  # 连接超时时间：30秒
      max-lifetime: 1800000      # 连接最大生命周期：30分钟
      connection-test-query: SELECT 1  # 连接测试查询
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 0
      # 2核4G服务器Redis连接池配置（Lettuce）
      lettuce:
        pool:
          max-active: 12          # 最大连接数：Tomcat线程数+4=12
          max-idle: 8             # 最大空闲连接：8
          min-idle: 2             # 最小空闲连接：2
          max-wait: 3000ms        # 连接等待超时：3秒
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        fail-fast: false
        ip: 127.0.0.1
        heartbeat-interval: 10000
        heartbeat-timeout: 20000
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
        port: 8721
      eager: true
  mvc:
    view:
      prefix: /templates/
      suffix: .html
short-link:
  protocol: http
#  protocol: https
  domain:
#    default: pengwater.xin
    default: nurl.local

gaode:
  amap:
    key: c2a69289fa819a2e36b6e467c82d692c
# RocketMQ 核心配置
rocketmq:
  name-server: 127.0.0.1:9876  # 虚拟机 NameServer 地址（关键！）
  producer:
    group: default-producer-group  # 生产者组名，自定义
    send-message-timeout: 3000  # 发送超时时间
    retry-times-when-send-failed: 2  # 发送失败重试次数
  consumer:
    group: default-consumer-group  # 消费者组名，自定义
    enable-msg-trace: true
stats:
  mq:
    enabled: false
logging:
  level:
    ShardingSphere-SQL: ERROR
    com.alibaba.shardingsphere.sql: ERROR