server:
  port: 8000  # 网关端口，用户访问这个端口
  tomcat:
    threads:
      max: 8  # 最大线程数，默认200，改成800
      min-spare: 2  # 最小空闲线程数
spring:
  application:
    name: shortlink-gateway
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  cloud:
    nacos:
      discovery:
        server-addr: 172.23.155.107:8848
        register-enabled: false
    gateway:
      routes:
        # 短链接直跳：/abc123 -> shortlink-project
        - id: shortlink-redirect
          uri: lb://shortlink-project
          predicates:
            - Path=/{short-uri}

        # 路由到 shortlink-admin 服务
        - id: shortlink-admin
          uri: lb://shortlink-admin  # lb:// 代表负载均衡，从 Nacos 找服务
          predicates:
            - Path=/api/short-link/admin/**  # 匹配 admin 接口路径

        # 仅保留监控接口到 shortlink-project，其余业务接口统一走 admin 转发
        - id: shortlink-project-monitor
          uri: lb://shortlink-project
          predicates:
            - Path=/api/short-link/project/v1/monitor/**

    # Sentinel 核心配置
    sentinel:
      transport:
        port: 8720 # 客户端和控制台通信端口（默认8719，冲突可改）
      eager: true # 启动时主动连接控制台（避免首次请求才初始化）
  data:
    redis:
      host: 172.23.155.107
      port: 6379
      password: 123456
      database: 0
      # 2核4G服务器Redis连接池配置（Lettuce）
      lettuce:
        pool:
          max-active: 12          # 最大连接数：Tomcat线程数+4=12
          max-idle: 8             # 最大空闲连接：8
          min-idle: 2             # 最小空闲连接：2
          max-wait: 3000ms        # 连接等待超时：3秒