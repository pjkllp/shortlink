name: Deploy Shortlink to Aliyun ECS

on:
  push:
    branches: [ "master" ]  # master分支有推送时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub云端Ubuntu环境
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 配置JDK环境（和你项目一致，这里用JDK17）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven  # 缓存Maven依赖，加速打包

      # 3. Maven打包（云端生成Jar，跳过测试）
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. SCP上传Jar包到服务器（三个服务的Jar都传）
      - name: Upload JAR files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}    # 服务器IP
          username: ${{ secrets.SERVER_USER }}# 服务器用户名
          password: ${{ secrets.SERVER_PWD }} # 服务器密码（或用key: ${{ secrets.SSH_PRIVATE_KEY }}）
          port: ${{ secrets.SERVER_PORT }}   # 服务器SSH端口
          source: "project/target/*.jar,admin/target/*.jar,gateway/target/*.jar"
          target: "/opt/shortlink"  # 服务器接收目录
          strip_components: 2  # 去掉target目录层级，直接把Jar放target同级

      # 5. SSH连接服务器，启动Docker
      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PWD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 进入部署目录
            cd /opt/shortlink
            # 创建日志目录
            mkdir -p logs/{project,admin,gateway}
            # 停止旧容器，启动新容器
            if command -v docker compose &> /dev/null; then
              docker compose down
              docker compose up -d --build
            else
              docker-compose down
              docker-compose up -d --build
            fi
            # 查看容器状态
            docker compose ps