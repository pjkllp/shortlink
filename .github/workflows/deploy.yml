name: Deploy Shortlink to Aliyun ECS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 配置JDK17
      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Maven打包 跳过测试
      - name: maven打包
        run: mvn clean install -DskipTests

      # 4. 加载SSH私钥代理
      - name: 加载SSH私钥代理
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 5. 自动信任服务器指纹
      - name: 信任服务器主机指纹
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: 远程清理旧文件&旧目录
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/shortlink && rm -f *.jar"
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/shortlink && rm -rf admin project gateway"
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/shortlink && mkdir -p logs/{project,admin,gateway}"

  # 6. SCP上传：只传必要文件，不带多余内容
      - name: 上传所有文件与目录
        run: |
      # 1. 上传根目录的 compose 配置文件
          scp -P ${{ secrets.SERVER_PORT }} docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
      
      # 2. 上传三个模块的Jar包（根目录）
          scp -P ${{ secrets.SERVER_PORT }} project/target/*.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
          scp -P ${{ secrets.SERVER_PORT }} admin/target/*.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
          scp -P ${{ secrets.SERVER_PORT }} gateway/target/*.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
      
      # 3. 【关键】只上传每个目录下的 Dockerfile，不上传整个目录
      # 先在服务器上创建目录（如果不存在）
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /opt/shortlink/admin /opt/shortlink/project /opt/shortlink/gateway"
      # 把每个目录的 Dockerfile 传到服务器对应位置
          scp -P ${{ secrets.SERVER_PORT }} admin/Dockerfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/admin/
          scp -P ${{ secrets.SERVER_PORT }} project/Dockerfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/project/
          scp -P ${{ secrets.SERVER_PORT }} gateway/Dockerfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/gateway/
      - name: 远程部署启动服务
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/shortlink && (docker compose down || docker-compose down)"
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/shortlink && (docker compose up -d --build || docker-compose up -d --build)"
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/shortlink && (docker compose ps || docker-compose ps)"