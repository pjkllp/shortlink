name: ShortLink 微服务 Docker 部署
run-name: ${{ github.actor }} 触发部署 @${{ github.sha }}

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test with Maven
        run: mvn clean install -DskipTests

      # 新增步骤：把服务器指纹写入信任列表
      - name: Add server host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to Alibaba Cloud Linux
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            DEPLOY_DIR="/opt/shortlink"
            mkdir -p $DEPLOY_DIR/logs/{project,admin,gateway}
            cd $DEPLOY_DIR
            rm -rf gateway project admin docker-compose.yml
            git clone --depth 1 -b master https://github.com/pjkllp/shortlink.git temp_code
            cp -r temp_code/* ./
            rm -rf temp_code
            if command -v docker compose &> /dev/null; then
              docker compose down
              docker compose up -d --build
            else
              docker-compose down
              docker-compose up -d --build
            fi
          EOF