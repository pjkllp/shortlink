name: Deploy Shortlink to Aliyun ECS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 配置JDK17
      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Maven打包 跳过测试
      - name: maven打包
        run: mvn clean install -DskipTests

      # 4. 加载SSH私钥代理
      - name: 加载SSH私钥代理
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 5. 自动信任服务器指纹
      - name: 信任服务器主机指纹
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # ========== 新增：先远程清理服务器旧文件（关键修复） ==========
      - name: 远程清理旧文件&旧目录
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<- 'EOF'
            cd /opt/shortlink
            rm -f *.jar
            rm -rf admin project gateway
            mkdir -p logs/{project,admin,gateway}
          EOF

      # 6. SCP上传：全新文件/目录（此时服务器已经是干净环境）
      - name: 上传所有文件与目录
        run: |
          scp -P ${{ secrets.SERVER_PORT }} docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
          scp -P ${{ secrets.SERVER_PORT }} project/target/*.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
          scp -P ${{ secrets.SERVER_PORT }} admin/target/*.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
          scp -P ${{ secrets.SERVER_PORT }} gateway/target/*.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/
          scp -r -P ${{ secrets.SERVER_PORT }} admin project gateway ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shortlink/

      # 7. 远程启动Docker
      - name: 远程部署启动服务
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<- 'EOF'
            COMPOSE_FILE="/opt/shortlink/docker-compose.yml"
            if command -v docker compose &> /dev/null; then
              docker compose -f $COMPOSE_FILE down
              docker compose -f $COMPOSE_FILE up -d --build
              docker compose -f $COMPOSE_FILE ps
            else
              docker-compose -f $COMPOSE_FILE down
              docker-compose -f $COMPOSE_FILE up -d --build
              docker-compose -f $COMPOSE_FILE ps
            fi
          EOF