server:
  port: 8002
  tomcat:
    threads:
      max: 8  # 最大线程数，默认200，改成800
      min-spare: 2  # 最小空闲线程数
spring:
  application:
    name: shortlink-admin
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config-prod.yaml
    hikari:
      pool-name: HikariPool-ShortLink
      # 2核4G服务器核心配置
      maximum-pool-size: 10      # 最大连接数：CPU核心数*2+2=10（4*2+2）
      minimum-idle: 4            # 最小空闲连接：物理核心数*2=4
      idle-timeout: 30000        # 空闲连接超时时间：30秒（比之前长，避免频繁创建销毁）
      connection-timeout: 30000  # 连接超时时间：30秒
      max-lifetime: 1800000      # 连接最大生命周期：30分钟
      connection-test-query: SELECT 1  # 连接测试查询
  cloud:
    nacos:
      discovery:
        server-addr: 172.23.155.107:8848
        register-enabled: true
        fail-fast: false
        heartbeat-interval: 10000
        heartbeat-timeout: 20000
    sentinel:
      transport:
        port: 8719
      eager: true
      web-context-unify: false
  data:
    redis:
      host: 172.23.155.107
      port: 6379
      password: 123456
      database: 0
      # 2核4G服务器Redis连接池配置（Lettuce）
      lettuce:
        pool:
          max-active: 12          # 最大连接数：Tomcat线程数+4=12
          max-idle: 8             # 最大空闲连接：8
          min-idle: 2             # 最小空闲连接：2
          max-wait: 3000ms        # 连接等待超时：3秒
  # 邮件发送配置（核心）
  mail:
    host: smtp.qq.com       # QQ 邮箱 SMTP 服务器地址
    port: 587               # 端口（587 是 TLS 加密端口，推荐使用）
    username: 2797857024@qq.com # 你的 QQ 邮箱账号（发件人邮箱）
    password: hsjyuvevaqqlddbh  # 你的 QQ 邮箱授权码（不是登录密码！）
    default-encoding: UTF-8 # 编码格式
    properties:
      mail:
        smtp:
          auth: true        # 开启认证
          starttls:
            enable: true    # 开启 TLS 加密
            required: true  # 强制使用 TLS 加密