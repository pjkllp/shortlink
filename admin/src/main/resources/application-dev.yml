server:
  port: 8002
spring:
  application:
    name: shortlink-admin
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
    hikari:
      pool-name: HikariPool-ShortLink

      maximum-pool-size: 10
      minimum-idle: 4
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        register-enabled: true
        ip: 127.0.0.1
        fail-fast: false
        heartbeat-interval: 10000
        heartbeat-timeout: 20000
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
        port: 8719
      eager: true
      web-context-unify: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 0
      lettuce:
        pool:
          max-active: 12
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms
  # 邮件发送配置（核心）
  mail:
    host: smtp.qq.com       # QQ 邮箱 SMTP 服务器地址
    port: 587               # 端口（587 是 TLS 加密端口，推荐使用）
    username: 2797857024@qq.com # 你的 QQ 邮箱账号（发件人邮箱）
    password: hsjyuvevaqqlddbh  # 你的 QQ 邮箱授权码（不是登录密码！）
    default-encoding: UTF-8 # 编码格式
    properties:
      mail:
        smtp:
          auth: true        # 开启认证
          starttls:
            enable: true    # 开启 TLS 加密
            required: true  # 强制使用 TLS 加密